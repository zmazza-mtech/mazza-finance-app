services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_build:/usr/share/caddy:ro
      - ./localhost+2.pem:/certs/localhost.pem:ro
      - ./localhost+2-key.pem:/certs/localhost-key.pem:ro
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-localhost}
      - CADDY_BASIC_AUTH_HASH=${CADDY_BASIC_AUTH_HASH}
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1001:1001"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 0.5
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELLER_CERT_PATH=/certs/teller_public_certificate.pem
      - TELLER_KEY_PATH=/certs/teller_private_key.pem
      - TELLER_ENVIRONMENT=${TELLER_ENVIRONMENT:-sandbox}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://localhost}
    volumes:
      - ${TELLER_CERT_PATH}:/certs/teller_public_certificate.pem:ro
      - ${TELLER_KEY_PATH}:/certs/teller_private_key.pem:ro
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: export
    volumes:
      - frontend_build:/app/dist
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # NO ports: mapping — internal network only (security requirement)
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  frontend_build:
